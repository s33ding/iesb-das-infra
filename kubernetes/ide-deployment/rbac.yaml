apiVersion: v1
kind: ServiceAccount
metadata:
  name: ide-admin
  namespace: ads-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::248189947068:role/ide-admin-ecr-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ads-namespace-admin
  namespace: ads-system
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts", "endpoints"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["*"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ide-admin-binding
  namespace: ads-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ads-namespace-admin
subjects:
- kind: ServiceAccount
  name: ide-admin
  namespace: ads-system
