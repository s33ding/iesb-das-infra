apiVersion: apps/v1
kind: Deployment
metadata:
  name: bayarea-app
  namespace: ads-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bayarea
  template:
    metadata:
      labels:
        app: bayarea
    spec:
      automountServiceAccountToken: false
      containers:
      - name: bayarea
        image: nginx:alpine
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      initContainers:
      - name: init-html
        image: busybox
        command: ['sh', '-c', 'echo "<!DOCTYPE html><html><head><title>Bay Area - DataIESB</title></head><body><h1>Bay Area Application</h1><p>Welcome to bayarea.dataiesb.com</p></body></html>" > /html/index.html']
        volumeMounts:
        - name: html
          mountPath: /html
      volumes:
      - name: html
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: bayarea-service
  namespace: ads-system
spec:
  selector:
    app: bayarea
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bayarea-ingress
  namespace: ads-system
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:248189947068:certificate/6d8e0740-fa40-4171-aff9-7cd815b6e2e8
spec:
  rules:
  - host: bayarea.dataiesb.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bayarea-service
            port:
              number: 80
